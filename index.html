<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Riviera Escape</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      background: black;
    }

    /* 🎥 VIDEO BACKGROUND */
    .hero {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    video {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
    }

    .hero-text {
      position: relative;
      z-index: 2;
      text-align: center;
      top: 40%;
      transform: translateY(-50%);
    }

    .hero-text h1 {
      font-size: 60px;
      animation: fadeIn 2s ease;
    }

    .hero-text p {
      font-size: 20px;
      opacity: 0.8;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    /* 🏡 CARDS */
    .section {
      padding: 60px 20px;
      background: #111;
    }

    .cards {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      width: 300px;
      overflow: hidden;
      border-radius: 10px;
      transition: 0.3s;
    }

    .card img {
      width: 100%;
      transition: 0.5s;
    }

    .card:hover img {
      transform: scale(1.1);
    }

    .card h3 {
      text-align: center;
      margin: 10px 0;
    }

    /* 🌊 PARALLAX */
    .parallax {
      background-image: url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
      height: 400px;
      background-attachment: fixed;
      background-size: cover;
      background-position: center;
    }

    /* 🗺️ MAP */
    iframe {
      width: 100%;
      height: 400px;
      border: none;
    }

  </style>
</head>

<body>

<!-- 🎥 HERO -->
<div class="hero">
  <video autoplay muted loop>
    <source src="https://cdn.coverr.co/videos/coverr-aerial-view-of-a-beach-1573/1080p.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="hero-text">
    <h1>Riviera Escape</h1>
    <p>Открой для себя отдых у моря</p>
  </div>
</div>

<!-- 🏡 LISTINGS -->
<div class="section">
  <div class="cards">

    <a href="listing1.html">
      <div class="card">
        <img src="https://images.unsplash.com/photo-1505691938895-1758d7feb511">
        <h3>Уют у моря</h3>
      </div>
    </a>

    <a href="listing2.html">
      <div class="card">
        <img src="https://images.unsplash.com/photo-1560185007-c5ca9d2c014d">
        <h3>Вид на закат</h3>
      </div>
    </a>

  </div>
</div>

<!-- 🌊 PARALLAX -->
<div class="parallax"></div>

<!-- 🗺️ MAP -->
<div class="section">
  <h2 style="text-align:center;">Где это находится</h2>

  <iframe 
    src="https://maps.google.com/maps?q=Nice,France&t=&z=12&ie=UTF8&iwloc=&output=embed">
  </iframe>
</div>

</body>
</html>
