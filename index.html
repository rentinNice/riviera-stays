<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riviera Escape</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }

h1, h2, h3 { font-family: 'Playfair Display', serif; }

/* fade animation */
.fade-up {
opacity: 0;
transform: translateY(40px);
transition: all 1s ease;
}
.fade-up.show {
opacity: 1;
transform: translateY(0);
}

/* 💎 PREMIUM TOGGLE */
.lux-toggle {
position: relative;
width: 360px;
margin: 40px auto;
display: flex;
background: rgba(255,255,255,0.1);
border-radius: 50px;
padding: 6px;
backdrop-filter: blur(15px);
box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.lux-option {
flex: 1;
text-align: center;
padding: 14px 0;
cursor: pointer;
color: rgba(255,255,255,0.6);
font-size: 15px;
z-index: 2;
transition: 0.3s;
}

.lux-option.active {
color: black;
font-weight: 600;
}

.lux-slider {
position: absolute;
top: 6px;
left: 6px;
width: calc(50% - 6px);
height: calc(100% - 12px);
background: white;
border-radius: 50px;
transition: 0.35s;
}

/* cards */
.card img {
transition: 0.4s;
}
.card:hover img {
transform: scale(1.08);
}

/* parallax */
.parallax {
background-image: url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
height: 400px;
background-attachment: fixed;
background-size: cover;
background-position: center;
}
</style>
</head>

<body class="bg-black text-white">

<!-- 💎 HERO -->
<section
class="relative h-screen flex items-center justify-center text-center bg-cover bg-center"
style="background-image: url('00.jpg');"
>

<div class="absolute inset-0 bg-black/60"></div>

<div class="relative z-10 px-6 fade-up">
<h1 class="text-4xl md:text-6xl mb-6 font-bold">
Там, где начинается твой отпуск
</h1>

<p class="text-lg md:text-2xl mb-8 opacity-80">
Открой для себя отдых у моря
</p>

<a href="#listings"
class="px-8 py-3 bg-white text-black rounded-full hover:bg-gray-200 transition">
Смотреть варианты
</a>
</div>
</section>

<!-- 💎 TOGGLE -->
<div class="lux-toggle">
<div class="lux-slider"></div>

<div class="lux-option active" onclick="switchType('apartment', this)">
Квартиры
</div>

<div class="lux-option" onclick="switchType('villa', this)">
Виллы
</div>
</div>

<!-- 🏡 LISTINGS -->
<section id="listings" class="py-16 bg-[#111]">
<div class="flex gap-6 justify-center flex-wrap">

<a href="listing1.html">
<div class="card w-[300px]" data-type="apartment">
<img src="photo1.jpg" class="w-full rounded-xl">
<h3 class="text-center mt-3">Уют у моря</h3>
</div>
</a>

<a href="listing2.html">
<div class="card w-[300px]" data-type="villa">
<img src="https://images.unsplash.com/photo-1560185007-c5ca9d2c014d" class="w-full rounded-xl">
<h3 class="text-center mt-3">Вид на закат</h3>
</div>
</a>

</div>
</section>

<!-- 🌊 PARALLAX -->
<div class="parallax"></div>

<!-- 🗺️ MAP -->
<section class="py-16 bg-[#111] text-center">
<h2 class="text-3xl mb-6">Где это находится</h2>

<iframe
class="w-full h-[400px]"
src="https://maps.google.com/maps?q=Nice,France&t=&z=12&ie=UTF8&iwloc=&output=embed">
</iframe>
</section>

<script>
function switchType(type, el) {
const slider = document.querySelector(".lux-slider");
const options = document.querySelectorAll(".lux-option");
const cards = document.querySelectorAll(".card");

options.forEach(o => o.classList.remove("active"));
el.classList.add("active");

if (type === "apartment") {
slider.style.left = "6px";
} else {
slider.style.left = "50%";
}

cards.forEach(card => {
card.style.display =
card.dataset.type === type ? "block" : "none";
});
}

window.onload = () => {
document.querySelector(".fade-up").classList.add("show");
switchType('apartment', document.querySelector('.lux-option'));
};
</script>

</body>
</html>
