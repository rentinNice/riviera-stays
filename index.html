<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Riviera Escape</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      background: black;
    }

    /* 🎥 HERO */
    .hero {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    video {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
    }

    .hero-text {
      position: relative;
      z-index: 2;
      text-align: center;
      top: 40%;
      transform: translateY(-50%);
    }

    .hero-text h1 {
      font-size: 60px;
      animation: fadeIn 2s ease;
    }

    .hero-text p {
      font-size: 20px;
      opacity: 0.8;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    /* 💎 PREMIUM TOGGLE */
    .lux-toggle {
      position: relative;
      width: 360px;
      margin: 50px auto;
      display: flex;
      background: rgba(255,255,255,0.08);
      border-radius: 50px;
      padding: 6px;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .lux-option {
      flex: 1;
      text-align: center;
      padding: 14px 0;
      cursor: pointer;
      color: rgba(255,255,255,0.6);
      font-size: 16px;
      z-index: 2;
      transition: 0.3s;
      font-weight: 500;
    }

    .lux-option.active {
      color: black;
      font-weight: 600;
    }

    .lux-slider {
      position: absolute;
      top: 6px;
      left: 6px;
      width: calc(50% - 6px);
      height: calc(100% - 12px);
      background: white;
      border-radius: 50px;
      transition: 0.35s;
      box-shadow: 0 8px 20px rgba(255,255,255,0.25);
    }

    /* 🏡 CARDS */
    .section {
      padding: 60px 20px;
      background: #111;
    }

    .cards {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      width: 300px;
      overflow: hidden;
      border-radius: 12px;
      transition: 0.3s;
    }

    .card img {
      width: 100%;
      transition: 0.5s;
    }

    .card:hover img {
      transform: scale(1.08);
    }

    .card h3 {
      text-align: center;
      margin: 10px 0;
    }

    /* 🌊 PARALLAX */
    .parallax {
      background-image: url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
      height: 400px;
      background-attachment: fixed;
      background-size: cover;
      background-position: center;
    }

    /* 🗺️ MAP */
    iframe {
      width: 100%;
      height: 400px;
      border: none;
    }
  </style>
</head>

<body>

<!-- 🎥 HERO -->
<div class="hero">
  <video autoplay muted loop>
    <source src="https://cdn.coverr.co/videos/coverr-aerial-view-of-a-beach-1573/1080p.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="hero-text">
    <h1>Riviera Escape</h1>
    <p>Там, где начинается твой отпуск</p>
  </div>
</div>

<!-- 💎 PREMIUM TOGGLE -->
<div class="lux-toggle">
  <div class="lux-slider"></div>

  <div class="lux-option active" onclick="switchType('apartment', this)">
    Квартиры
  </div>

  <div class="lux-option" onclick="switchType('villa', this)">
    Виллы
  </div>
</div>

<!-- 🏡 LISTINGS -->
<div class="section">
  <div class="cards">

    <a href="listing1.html">
      <div class="card" data-type="apartment">
        <img src="https://images.unsplash.com/photo-1505691938895-1758d7feb511">
        <h3>Уют у моря</h3>
      </div>
    </a>

    <a href="listing2.html">
      <div class="card" data-type="villa">
        <img src="https://images.unsplash.com/photo-1560185007-c5ca9d2c014d">
        <h3>Вид на закат</h3>
      </div>
    </a>

  </div>
</div>

<!-- 🌊 PARALLAX -->
<div class="parallax"></div>

<!-- 🗺️ MAP -->
<div class="section">
  <h2 style="text-align:center;">Где это находится</h2>

  <iframe src="https://maps.google.com/maps?q=Nice,France&t=&z=12&ie=UTF8&iwloc=&output=embed"></iframe>
</div>

<script>
function switchType(type, el) {
  const slider = document.querySelector(".lux-slider");
  const options = document.querySelectorAll(".lux-option");
  const cards = document.querySelectorAll(".card");

  options.forEach(o => o.classList.remove("active"));
  el.classList.add("active");

  if (type === "apartment") {
    slider.style.left = "6px";
  } else {
    slider.style.left = "50%";
  }

  cards.forEach(card => {
    card.style.display =
      card.dataset.type === type ? "block" : "none";
  });
}

window.onload = () => {
  switchType('apartment', document.querySelector('.lux-option'));
};
</script>

</body>
</html>
